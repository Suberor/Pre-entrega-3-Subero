<!DOCTYPE html>
<html lang="en">
    <head>
        {% load static %}
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content="" />
        <meta name="author" content="" />
        <title>Critical Role - Start Bootstrap Theme</title>
        <link rel="icon" type="image/x-icon" href="{% static 'FamilyApp/assets/favicon.ico' %}" />
        <!-- Font Awesome icons (free version)-->
        <script src="https://use.fontawesome.com/releases/v6.1.0/js/all.js" crossorigin="anonymous"></script>
        <!-- Google fonts-->
        <link href="https://fonts.googleapis.com/css?family=Varela+Round" rel="stylesheet" />
        <link href="https://fonts.googleapis.com/css?family=Nunito:200,200i,300,300i,400,400i,600,600i,700,700i,800,800i,900,900i" rel="stylesheet" />
        <!-- Core theme CSS (includes Bootstrap)-->
        <link href="{% static 'FamilyApp/css/styles.css' %}" rel="stylesheet" />
    </head>
    <body id="page-top">
        <!-- Navigation-->
        <nav class="navbar navbar-expand-lg navbar-light fixed-top" id="mainNav">
            <div class="container px-4 px-lg-5">
                <a class="navbar-brand" href="#page-top"></a>
                <button class="navbar-toggler navbar-toggler-right" type="button" data-bs-toggle="collapse" data-bs-target="#navbarResponsive" aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation">
                    Menu
                    <i class="fas fa-bars"></i>
                </button>
                <div class="collapse navbar-collapse" id="navbarResponsive">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="/FamilyApp/hechizos">Spells</a></li>
                        <li class="nav-item"><a class="nav-link" href="/FamilyApp/monstruos">Monsters</a></li>
                        <li class="nav-item"><a class="nav-link" href="/FamilyApp/armas">Weapons</a></li>
                    </ul>
                </div>
            </div>
        </nav>
        <!-- Masthead-->
        <header class="masthead">
            <div class="container px-4 px-lg-5 d-flex h-100 align-items-center justify-content-center">
                <div class="d-flex justify-content-center">
                    <div class="text-center">
                        <h1 class="mx-auto my-0 text-uppercase">
                            {% block titulo %}                                             
                            {% endblock %}
                        </h1>
                    </div>
                </div>
            </div>
        </header>
        <!-- About-->
        <section class="about-section" id="about">
            <div class="container px-4 px-lg-5">
                <div class="row gx-4 gx-lg-5">
                    <div class="col-lg-8">
                        <h2 class="text-white mb-4">
                            {% block formulario %}                       
                            {% endblock%}
                        </h2>
                        <p class="text">
                            {% block buscar %}
                            {% endblock %}                                       
                        </p>
                    </div>
                </div>
                {% block imagen %}
                <img class="img-fluid" src="{% static 'FamilyApp/assets/img/maxresdefault.jpg' %}" alt="..." />
                {% endblock %} 
            </div>
        </section>
